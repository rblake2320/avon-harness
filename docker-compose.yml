services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: mkharness
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mk -d mkharness"]
      interval: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://mk:${POSTGRES_PASSWORD}@db:5432/mkharness
      JWT_SECRET: ${JWT_SECRET:?set in .env}
      MASTER_KEY: ${MASTER_KEY:?set in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-30}
    depends_on:
      db: { condition: service_healthy }

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports: ["8080:80"]
    depends_on: [api]

volumes:
  pgdata:
