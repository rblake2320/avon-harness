name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest -v
        env:
          MK_ALLOW_DEV_SECRETS: "1"

  web-build:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package.json
      - run: npm install
      - run: npm run build   # tsc -b strict typecheck + vite production build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, web-build]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t mk-harness-api ./backend
      - run: docker build -t mk-harness-web -f web/Dockerfile .
